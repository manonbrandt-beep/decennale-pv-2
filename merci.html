<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Demande reçue — Alexis Assurances</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"></noscript>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:     #0733A4;
    --blue-ink: #041c5c;
    --yellow:   #FFB511;
    --ink:      #0d1117;
    --gray-600: #5f6470;
    --gray-200: #e2e5ec;
  }

  html, body {
    min-height: 100%;
    font-family: 'Manrope', system-ui, sans-serif;
    background: linear-gradient(135deg, var(--blue-ink) 0%, var(--blue) 100%);
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
    text-align: center;
  }

  .card {
    background: #fff;
    color: var(--ink);
    border-radius: 24px;
    padding: 52px 44px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 40px 80px -20px rgba(4,28,92,.5);
    position: relative;
  }
  .card::before {
    content: "";
    position: absolute;
    inset: -16px;
    background: linear-gradient(135deg, rgba(255,181,17,.2), transparent 60%);
    filter: blur(40px);
    z-index: -1;
    border-radius: 32px;
  }

  .icon {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: #eef9f0;
    color: #10b981;
    display: grid;
    place-items: center;
    margin: 0 auto 24px;
  }

  h1 {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -.02em;
    margin-bottom: 12px;
    color: var(--ink);
  }

  .sub {
    font-size: 15px;
    color: var(--gray-600);
    line-height: 1.65;
    margin-bottom: 32px;
  }

  .steps {
    background: #f7f9ff;
    border-radius: 14px;
    padding: 20px 24px;
    text-align: left;
    margin-bottom: 32px;
  }
  .steps p {
    font-size: 13px;
    font-weight: 700;
    color: var(--blue);
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .step-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    font-size: 14px;
    color: var(--ink);
    line-height: 1.5;
    margin-bottom: 10px;
  }
  .step-item:last-child { margin-bottom: 0; }
  .step-num {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--blue);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    display: grid;
    place-items: center;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .btn-back {
    display: inline-block;
    padding: 12px 28px;
    background: var(--blue);
    color: #fff;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    border-radius: 999px;
    text-decoration: none;
    transition: background .2s;
  }
  .btn-back:hover { background: var(--blue-ink); }

  .mention {
    margin-top: 20px;
    font-size: 12px;
    color: rgba(255,255,255,.55);
  }

  @media(max-width:480px) {
    .card { padding: 36px 24px; }
    h1 { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="icon">
    <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M20 6L9 17l-5-5"/>
    </svg>
  </div>

  <h1>Votre demande a bien été reçue !</h1>
  <p class="sub">Un expert Alexis Assurances spécialisé en photovoltaïque vous recontacte sous <strong>24h ouvrées</strong> pour analyser votre situation.</p>

<a href="index.html" class="btn-back">Retour à l'accueil</a>
</div>

<p class="mention">Alexis Assurances — ORIAS n°18001240</p>

</body>
</html>
